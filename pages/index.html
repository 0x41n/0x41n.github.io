<!DOCTYPE html><html><head>
<meta charset=UTF-8>
<title>メモおきば</title>
<link rel='stylesheet' href='../css/nost.css'>
<link rel='stylesheet' href='../css/icon.css'>
<style>
#head{
	display:flex;
	align-items:center;
	justify-content:space-between;
}
#head p{
	width:15em;
	max-width:50%;
	display:flex;
}
#head input, #head select{
	width:0;
	flex:1;
}
#result{
	display:grid;
	gap:1em;
	grid-template-columns:repeat(2, minmax(0, 1fr));
}
#result a{
	height:10em;
	padding:1em;
	border:var(--border);
	display: flex;
	flex-direction: column;
}
#result .ttl{
	font-weight:bold;
}
#result .info{
	font-size:.8em;
	margin-top:auto;
	color:var(--gray);
	user-select:none;
}
@media(max-width:40em){
	#result{grid-template-columns:repeat(1, minmax(0, 1fr))}
}
</style>
<link rel=icon type=image/svg+xml href=https://0x41n.github.io/file/fav.svg>

</p>
</div>
